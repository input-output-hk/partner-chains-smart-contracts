name: 'Partner Chains Smart Contracts CI'
on:
  pull_request:
  push:
    branches:
      - master
      - develop
  workflow_dispatch:

env:
  AWS_DEFAULT_REGION: eu-central-1

jobs:
  build-x64-linux:
    permissions:
      id-token: write
      contents: read
    runs-on: [ self-hosted, Linux ]
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Add signing key for nix
        run: echo "${{ secrets.NIX_SIGNING_KEY }}" > "${{ runner.temp }}/nix-key"

      - name: restore cache
        uses: actions/cache/restore@v3
        with:
          key: linux-${{ github.sha }}
          path: ~/.local/state/cabal
          restore-keys: linux-

      - name: Build onchain
        run: |
          cd onchain
          nix develop --command "make"

      - name: save cache
        uses: actions/cache/save@v3
        with:
          key: linux-${{ github.sha }}
          path: ~/.local/state/cabal

      - name: Build offchain 
        run: |
          cd offchain
          nix develop --command "make"

      - name: Acquire AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Copy nix scopes to nix cache
        run: |
          nix-store --stdin -q --deriver < ${{ runner.temp }}/outputs | nix-store --stdin -qR --include-outputs \
          | nix copy --stdin --to \
          "s3://cache.sc.iog.io?secret-key=${{ runner.temp }}/nix-key&region=$AWS_DEFAULT_REGION" \
          && rm ${{ runner.temp }}/outputs

  test-x64-linux:
    permissions:
      id-token: write
      contents: read
    runs-on: [ self-hosted, Linux ]
    needs:
      - build-x64-linux
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
      - name: Run tests
        run: |
          cd offchain
          nix-shell --run "make test"
